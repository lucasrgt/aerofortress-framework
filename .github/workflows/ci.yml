name: CI

on:
  push:
    branches: [main]
  pull_request:

# Two native engines, one front door (per frontend/README): the .NET backend slice and the React/TS frontend
# slice each get a gate. A change to either fails CI on its own terms.
jobs:
  dotnet:
    name: backend (dotnet build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build Lazuli.slnx -c Release
      - run: dotnet test Lazuli.slnx -c Release --no-build

  frontend:
    name: frontend-sdk (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-sdk/package-lock.json
      - run: npm ci
      - run: npm run check
