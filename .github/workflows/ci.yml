name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

# Two native engines, one front door (per frontend/README): the .NET backend slice and the React/TS frontend
# slice each get a gate. A change to either fails CI on its own terms.
jobs:
  dotnet:
    name: backend (af gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
      # Dogfood the public release gate instead of duplicating its build/test legs. This also exercises the
      # declarations × subject-bound proofs × TRX verdict matrix on Linux for every framework change.
      - run: dotnet run --project src/AeroFortress.Framework.Cli/AeroFortress.Framework.Cli.csproj -c Release -- gate AeroFortress.Framework.slnx -c Release

  frontend:
    name: frontend-sdk (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-sdk
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-sdk/package-lock.json
      - run: npm ci
      - run: npm run check
