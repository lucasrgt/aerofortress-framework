name: publish

# Publishes the AeroFortress framework packages to nuget.org. Triggered by pushing a version tag (e.g. `v0.1.0`) — bump
# <Version> in build/AeroFortress.Framework.Library.props first, then tag. Needs the NUGET_API_KEY secret (a nuget.org API key).
# The set below is the public framework surface: SelfHarness (framework-dev only), the CLI (a tool — separate
# packaging), Geocoding (not yet on the library standard), and the sample/tests are deliberately excluded.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: pack + push to nuget.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: pack
        run: |
          for proj in \
            src/AeroFortress/AeroFortress.Framework.csproj \
            src/AeroFortress.Framework.Abstractions/AeroFortress.Framework.Abstractions.csproj \
            src/AeroFortress.Framework.AspNetCore/AeroFortress.Framework.AspNetCore.csproj \
            src/AeroFortress.Framework.Auth/AeroFortress.Framework.Auth.csproj \
            src/AeroFortress.Framework.Identity/AeroFortress.Framework.Identity.csproj \
            src/AeroFortress.Framework.Mail/AeroFortress.Framework.Mail.csproj \
            src/AeroFortress.Framework.Sms/AeroFortress.Framework.Sms.csproj \
            src/AeroFortress.Framework.Storage/AeroFortress.Framework.Storage.csproj \
            src/AeroFortress.Framework.Testing/AeroFortress.Framework.Testing.csproj \
            src/AeroFortress.Framework.Testing.InMemory/AeroFortress.Framework.Testing.InMemory.csproj \
            src/AeroFortress.Framework.Cli/AeroFortress.Framework.Cli.csproj \
            analyzers/AeroFortress.Framework.Doctor/AeroFortress.Framework.Doctor.csproj ; do
            dotnet pack "$proj" -c Release -o nupkgs
          done
      - name: push
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
