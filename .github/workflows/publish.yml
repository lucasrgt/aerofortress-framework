name: publish

# Publishes the AeroFortress framework — both engines off ONE version tag (e.g. `v1.0.0`): the .NET backend to
# nuget.org and the React frontend to npm. Bump the version first (back: <Version> in
# build/AeroFortress.Framework.Library.props; front: each publishable packages/* package.json), then tag.
# Auth: nuget uses Trusted Publishing (OIDC — no stored key; a policy on nuget.org binds owner/repo/workflow and
# issues a short-lived key per run); npm uses the NPM_TOKEN secret (an automation token for the @aerofortress
# scope). The two jobs are independent — one ecosystem failing does not block the other. The nuget set below is
# the public framework surface: SelfHarness (framework-dev only), Geocoding (not yet on the library standard),
# and the sample/tests are deliberately excluded.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  nuget:
    name: pack + push to nuget.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for nuget.org Trusted Publishing
      contents: read # checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: pack
        run: |
          for proj in \
            src/AeroFortress/AeroFortress.Framework.csproj \
            src/AeroFortress.Framework.Abstractions/AeroFortress.Framework.Abstractions.csproj \
            src/AeroFortress.Framework.AspNetCore/AeroFortress.Framework.AspNetCore.csproj \
            src/AeroFortress.Framework.Auth/AeroFortress.Framework.Auth.csproj \
            src/AeroFortress.Framework.Identity/AeroFortress.Framework.Identity.csproj \
            src/AeroFortress.Framework.Mail/AeroFortress.Framework.Mail.csproj \
            src/AeroFortress.Framework.Sms/AeroFortress.Framework.Sms.csproj \
            src/AeroFortress.Framework.Storage/AeroFortress.Framework.Storage.csproj \
            src/AeroFortress.Framework.Testing/AeroFortress.Framework.Testing.csproj \
            src/AeroFortress.Framework.Testing.InMemory/AeroFortress.Framework.Testing.InMemory.csproj \
            src/AeroFortress.Framework.Cli/AeroFortress.Framework.Cli.csproj \
            analyzers/AeroFortress.Framework.Doctor/AeroFortress.Framework.Doctor.csproj ; do
            dotnet pack "$proj" -c Release -o nupkgs
          done
      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h) nuget.org key — no stored secret.
      # `user` is the public nuget.org profile name; the bound policy (owner lucasrgt, repo aerofortress-framework,
      # workflow publish.yml) lives on nuget.org. Requested right before push so the 1h key stays fresh.
      - name: nuget login (OIDC → temp key)
        uses: NuGet/login@v1
        id: login
        with:
          user: lucasrgt
      - name: push
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  npm:
    name: publish frontend packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: frontend-sdk/package-lock.json
      - name: install
        working-directory: frontend-sdk
        run: npm ci
      # Auto-discover the publishable workspace packages: skip the private root members and any version already
      # on npm (the npm equivalent of nuget's --skip-duplicate). Flipping a package's `private` off enrolls it
      # here automatically — one tag stays the single release lever as the surface grows (eslint-plugin, assay…).
      - name: publish public packages (skip versions already on npm)
        working-directory: frontend-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (the nuget leg is independent and still ran)."
            exit 0
          fi
          for dir in packages/*/; do
            name=$(node -p "try{require('./$dir/package.json').name||''}catch(e){''}")
            [ -z "$name" ] && continue
            private=$(node -p "try{!!require('./$dir/package.json').private}catch(e){true}")
            [ "$private" = "true" ] && { echo "skip $name (private)"; continue; }
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already on npm — skip"
            else
              echo "publishing $name@$ver"
              ( cd "$dir" && npm publish )
            fi
          done
