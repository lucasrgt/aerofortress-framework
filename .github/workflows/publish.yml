name: publish

# Publishes the Lazuli framework packages to nuget.org. Triggered by pushing a version tag (e.g. `v0.1.0`) — bump
# <Version> in build/Lazuli.Library.props first, then tag. Needs the NUGET_API_KEY secret (a nuget.org API key).
# The set below is the public framework surface: SelfHarness (framework-dev only), the CLI (a tool — separate
# packaging), Geocoding (not yet on the library standard), and the sample/tests are deliberately excluded.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: pack + push to nuget.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: pack
        run: |
          for proj in \
            src/Lazuli.Abstractions/Lazuli.Abstractions.csproj \
            src/Lazuli.AspNetCore/Lazuli.AspNetCore.csproj \
            src/Lazuli.Auth/Lazuli.Auth.csproj \
            src/Lazuli.Identity/Lazuli.Identity.csproj \
            src/Lazuli.Mail/Lazuli.Mail.csproj \
            src/Lazuli.Sms/Lazuli.Sms.csproj \
            src/Lazuli.Storage/Lazuli.Storage.csproj \
            src/Lazuli.Testing/Lazuli.Testing.csproj \
            src/Lazuli.Testing.InMemory/Lazuli.Testing.InMemory.csproj \
            analyzers/Lazuli.Doctor/Lazuli.Doctor.csproj ; do
            dotnet pack "$proj" -c Release -o nupkgs
          done
      - name: push
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
