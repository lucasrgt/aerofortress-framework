# Git hooks via lefthook. The index roots the fast commit check; commits being pushed root the complete affected
# proof closure. The CLI owns selection, so no feature annotation or caller-authored filter can weaken either.
pre-commit:
  commands:
    affected-fast:
      run: dotnet tool run af gate --staged --fast

pre-push:
  commands:
    affected-release:
      run: dotnet tool run af gate --affected --base origin/main
