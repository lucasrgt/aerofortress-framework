name: CI

# The AeroFortress done-gate, wired from birth: every push and PR runs `af gate` — the doctor
# (the AF*/AFFE* convention analyzers), every test including the [AVP] runtime proofs, and the
# declarations × proofs traceability matrix. The exit code IS the verdict, so a red gate cannot
# land silently; the local lefthook hooks are the fast echo, this job is the backstop.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    name: af gate (doctor + proofs + matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
      # When a frontend harness joins, add setup-node + `npm ci` here — the doctor discovers its package from
      # AeroFortress.toml and runs lint, typecheck, unit/integration, direct Assay, and E2E legs automatically.
      - name: install the AeroFortress CLI
        run: dotnet tool install -g aerofortress-framework-cli --version 0.3.0
      - name: af gate
        run: af gate
