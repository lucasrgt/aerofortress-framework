name: CI

# The default gate executes the complete proof closure affected by the Git delta. Inventory remains universal:
# missing AVP/Assay/E2E proof is red even when its runtime is not affected. A manual dispatch runs the exhaustive
# audit; releases should require that full verdict.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    name: af gate (affected proofs + universal inventory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool restore
      - name: affected gate
        if: github.event_name != 'workflow_dispatch'
        env:
          AF_GATE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: dotnet tool run af gate --affected
      - name: full audit
        if: github.event_name == 'workflow_dispatch'
        run: dotnet tool run af gate --full
