# AeroFortress workspace manifest — the single source of truth for this app's topology. `af doctor`
# validates it; `af build` / `af gen client` read it. One AeroFortress.toml per repo, at the root.

[workspace]
name = "AeroFortress.Framework.Starter"

[products.app]
backend = "src/AeroFortress.Framework.Starter.Api"   # .NET vertical slices — the AF* analyzers gate this build
# A AeroFortress frontend client is added under clients/ when you scaffold one:
# core = "clients/core"              # agnostic ViewModel (the data door) + design-system View + i18n + client
# apps = ["mobile", "web"]           # platform shells over the shared core

# Optional: where the aerofortress-framework framework checkout lives, when you develop against it. With this set,
# `af doctor` compares your AeroFortress* and frontend framework package versions against the checkout
# and fails on drift (the package-first law). Machines without the checkout (CI) skip the check.
# [framework]
# repo = "../aerofortress-framework"
