# AeroFortress workspace manifest — the single source of truth for this app's topology. `af doctor`
# validates it. One AeroFortress.toml per repo, at the root.

[workspace]
name = "AeroFortress.Framework.Starter"

[products.app]
backend = "src/AeroFortress.Framework.Starter.Api"   # .NET vertical slices — the AF* analyzers gate this build
# An AeroFortress frontend package is declared explicitly when added:
# core = "clients/core"              # shared ViewModels/Views; tests + Assay, no runner of its own
# library = "clients/ui"             # shared npm package; lint + typecheck + tests, no runner of its own
# frontend = "clients/web"           # executable surface; additionally owes full E2E

# Package synchronization is self-contained in the released CLI and frontend SDK. No sibling framework checkout
# is required locally or in CI; applications only declare their product topology here.
