# Lazuli workspace manifest — the single source of truth for this app's topology. `lazuli doctor`
# validates it; `lazuli build` / `lazuli gen client` read it. One Lazuli.toml per repo, at the root.

[workspace]
name = "Lazuli.Starter"

[products.app]
backend = "src/Lazuli.Starter.Api"   # .NET vertical slices — the LZ* analyzers gate this build
# A Lazuli frontend client is added under clients/ when you scaffold one:
# core = "clients/core"              # agnostic ViewModel (the data door) + design-system View + i18n + client
# apps = ["mobile", "web"]           # platform shells over the shared core

[harness]
backend = "Lazuli.Starter.slnx"      # the framework's LZ* Roslyn analyzers run via the solution build

[testing]
# Criticality policy — how the doctor treats a [Slice] that declares no criticality. The dial:
#   "opt-in"   = default; only a [Critical] slice needs happy+sad journeys. Today's behavior.
#   "explicit" = every slice must carry [Critical] or [NonCritical], else LZ0029 errors. Mirrors LZ0022.
#   "strict"   = an undecided slice is treated as [Critical] and must prove journeys; opt out with [NonCritical].
criticality = "opt-in"

# Optional: where the lazuli-net framework checkout lives, when you develop against it. With this set,
# `lazuli doctor` compares your Lazuli* package versions and the eslint-plugin mirror against the checkout
# and fails on drift (the package-first law). Machines without the checkout (CI) skip the check.
# [framework]
# repo = "../lazuli-net"
