# Wallets — Clockwork spec manifest
#
# The per-module acceptance spec for the Wallets slices. Each slice's `criteria` array lists the AVP
# catalog ids it must be PROVEN against; the doctor reads this file (as an AdditionalFile) to close the
# spec↔code bijection both ways: AF0031 fails any [Slice] not declared here with >=1 criterion,
# AF0030 fails a declared criterion that no subject-bound [AVP] proof verifies. The obligation lives here, not on
# source annotations, so the spec is a reviewable file beside the module.

module = "Wallets"

[slices.Withdraw]
criteria = ["idempotency-key-honored"]

[slices.Deposit]
criteria = ["idempotency-key-honored"]

[slices.GetBalance]
criteria = ["returns-current-balance"]

[slices.ListWallets]
criteria = ["returns-stable-page"]
